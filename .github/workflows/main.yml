name: ZWU Auto BOOK

on:
  workflow_dispatch:  # 支持手动触发
  # schedule:
  #   - cron: '57 12 * * *'  # UTC 12:57 = 北京时间 20:57（已改用 cron-job.org 触发，见 README）

permissions:
  contents: read

jobs:
  auto-book:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codes
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Auto BOOK
        env:
          SCKEY: ${{ secrets.SCKEY }}
          ACCOUNTS: ${{ secrets.ACCOUNTS }}              # 老用法（后向兼容，保留）
          ACCOUNTS_CONFIG: ${{ vars.ACCOUNTS_CONFIG }}    # 新用法：明文 Variable（账号清单 + 覆盖配置）
          PASSWORDS: ${{ secrets.PASSWORDS }}             # 新用法：密码映射 Secret（{学号: 密码}）
        run: python demo.py
