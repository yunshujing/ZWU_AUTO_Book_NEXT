# ============================================
# 预约参数配置
# ============================================

# 自习室编号: 0=112, 1=113, 2=114, 3=212, 4=213, 5=214, 6=312, 7=313, 8=314
room_id: 2

# 延后天数: 1=明天, 2=后天
dday: 2

# 开始时间: 8=8:00, 12=12:00, 21=21:00
begin: 12

# 持续时长（小时）
duration: 9

# 指定座位ID列表，留空或设为 null 则随机选座
# 查看座位ID: 打开 zwu_lib.xlsx
seat_ids:
  - 12920
  - 12921

# ============================================
# 抢座策略
# ============================================

# 提前几分钟开始尝试（GitHub Actions cron 可能不准时，提前启动等窗口开放）
cron-delta-minutes: 5

# 最大重试次数
max-retry: 20

# ============================================
# 通知配置（可选，留空则不通知）
# ============================================

# 通知方式: none / wechat / email
notification_type: wechat

# Server酱微信推送（notification_type=wechat 时生效）
# 获取 SCKEY: https://sct.ftqq.com/
sckey: ''

# 邮件通知（notification_type=email 时生效）
smtp:
  server: smtp.office365.com
  from_addr: ''
  password: ''
  to_addr: ''
